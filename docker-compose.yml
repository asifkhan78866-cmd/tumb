services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neuroseg-backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      # Persist weights, dataset and generated images across restarts.
      - ./backend/weights:/app/backend/weights
      - ./backend/dataset:/app/backend/dataset
      - ./backend/predictions:/app/backend/predictions
      - ./backend/logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: neuroseg-frontend
    ports:
      - "3000:3000"
    environment:
      # Browser talks to the backend on the host-published port.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
